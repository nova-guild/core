name: Nova Performance Benchmark

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Nova Server
        run: |
          docker build -t nova-app ./benchmark
          docker run -d --network="host" \
            --name nova-running-app \
            -e LOGGER=dev \
            nova-app

      - name: Wait for Server Ready
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/ > /dev/null; then
              echo "Nova is UP!"
              break
            fi
            echo "Waiting for Nova... ($i)"
            sleep 1
          done

      - name: Run k6 Benchmark (with Resource Monitoring)
        run: |
          NOVA_DIR=${{ github.workspace }}/benchmark

          touch $NOVA_DIR/results.json
          touch $NOVA_DIR/summary.json
          touch $NOVA_DIR/stats.log
          chmod 666 $NOVA_DIR/results.json $NOVA_DIR/summary.json $NOVA_DIR/stats.log

          docker stats nova-running-app \
            --format "{{.CPUPerc}},{{.MemUsage}},{{.MemPerc}},{{.NetIO}},{{.BlockIO}}" \
            >> $NOVA_DIR/stats.log &
          STATS_PID=$!

          docker run --rm \
            --network="host" \
            --add-host=host.docker.internal:host-gateway \
            -v $NOVA_DIR:/io \
            -i grafana/k6 run /io/scripts/bench.js \
            --out json=/io/results.json \
            --summary-export=/io/summary.json

          kill $STATS_PID 2>/dev/null || true
        continue-on-error: true

      - name: Parse Resource Usage Stats
        if: always()
        run: |
          STATS_FILE=${{ github.workspace }}/nova-test/stats.log   # <-- updated path
          if [ -f "$STATS_FILE" ] && [ -s "$STATS_FILE" ]; then
            PEAK_CPU=$(awk -F',' '{gsub(/[^0-9.]/, "", $1); print $1}' $STATS_FILE \
              | sort -g | tail -1)
            AVG_CPU=$(awk -F',' '{gsub(/[^0-9.]/, "", $1); sum+=$1; count++} END {printf "%.2f", sum/count}' $STATS_FILE)
            PEAK_MEM=$(awk -F',' '{print $2}' $STATS_FILE \
              | awk '{print $1}' | sort -h | tail -1)
            AVG_MEM_PERC=$(awk -F',' '{gsub(/[^0-9.]/, "", $3); sum+=$3; count++} END {printf "%.2f", sum/count}' $STATS_FILE)

            echo "PEAK_CPU=${PEAK_CPU}" >> $GITHUB_ENV
            echo "AVG_CPU=${AVG_CPU}" >> $GITHUB_ENV
            echo "PEAK_MEM=${PEAK_MEM}" >> $GITHUB_ENV
            echo "AVG_MEM_PERC=${AVG_MEM_PERC}" >> $GITHUB_ENV
            echo "Resource stats parsed successfully."
          else
            echo "stats.log not found or empty — skipping resource parsing."
            echo "PEAK_CPU=N/A" >> $GITHUB_ENV
            echo "AVG_CPU=N/A" >> $GITHUB_ENV
            echo "PEAK_MEM=N/A" >> $GITHUB_ENV
            echo "AVG_MEM_PERC=N/A" >> $GITHUB_ENV
          fi

      - name: Generate Action Summary
        if: always()
        run: |
          SUMMARY_FILE=${{ github.workspace }}/nova-test/summary.json   # <-- updated path
          echo "## Nova Performance Summary" >> $GITHUB_STEP_SUMMARY

          if [ -f "$SUMMARY_FILE" ] && [ -s "$SUMMARY_FILE" ]; then
            RPS=$(jq -r '.metrics.http_reqs.rate // 0' $SUMMARY_FILE)
            TOTAL=$(jq -r '.metrics.http_reqs.count // 0' $SUMMARY_FILE)
            P90=$(jq -r '.metrics.http_req_duration["p(90)"] // 0' $SUMMARY_FILE)
            P95=$(jq -r '.metrics.http_req_duration["p(95)"] // 0' $SUMMARY_FILE)
            AVG=$(jq -r '.metrics.http_req_duration.avg // 0' $SUMMARY_FILE)
            MED=$(jq -r '.metrics.http_req_duration.med // 0' $SUMMARY_FILE)
            DATA_RATE=$(jq -r '.metrics.data_received.rate // 0' $SUMMARY_FILE)
            FAILED=$(jq -r '.metrics.http_req_failed.passes // 0' $SUMMARY_FILE)

            PASSES=$(jq -r '.metrics.checks.passes // 0' $SUMMARY_FILE)
            FAILS=$(jq -r '.metrics.checks.fails // 0' $SUMMARY_FILE)
            TOTAL_CHKS=$((PASSES + FAILS))

            if [ "$TOTAL_CHKS" -gt 0 ]; then
              SRATE=$(echo "scale=2; ($PASSES / $TOTAL_CHKS) * 100" | bc -l || echo "0")
            else
              SRATE="0.00"
            fi

            DATA_MBPS=$(echo "scale=2; $DATA_RATE / 1048576" | bc -l)

            echo "RPS_VAL=$(printf "%.2f" $RPS)" >> $GITHUB_ENV
            echo "P95_VAL=$(printf "%.2f" $P95)" >> $GITHUB_ENV
            echo "P90_VAL=$(printf "%.2f" $P90)" >> $GITHUB_ENV
            echo "MED_VAL=$(printf "%.2f" $MED)" >> $GITHUB_ENV
            echo "AVG_VAL=$(printf "%.2f" $AVG)" >> $GITHUB_ENV
            echo "TOTAL_VAL=$TOTAL" >> $GITHUB_ENV
            echo "SRATE_VAL=$SRATE" >> $GITHUB_ENV
            echo "FAILED_VAL=$FAILED" >> $GITHUB_ENV
            echo "DATA_MBPS_VAL=$(printf "%.2f" $DATA_MBPS)" >> $GITHUB_ENV

            echo "### 📊 HTTP / k6 Metrics" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Requests** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **Failed Requests** | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Requests/sec** | $(printf "%.2f" $RPS) req/s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate** | $SRATE% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Throughput** | $(printf "%.2f" $DATA_MBPS) MB/s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Median Latency** | $(printf "%.2f" $MED)ms |" >> $GITHUB_STEP_SUMMARY
            echo "| **Average Latency** | $(printf "%.2f" $AVG)ms |" >> $GITHUB_STEP_SUMMARY
            echo "| **p90 Latency** | $(printf "%.2f" $P90)ms |" >> $GITHUB_STEP_SUMMARY
            echo "| **p95 Latency** | $(printf "%.2f" $P95)ms |" >> $GITHUB_STEP_SUMMARY
          else
            echo "summary.json not found or empty." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🖥️ Container Resource Usage (during benchmark)" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Peak CPU Usage** | ${{ env.PEAK_CPU }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Average CPU Usage** | ${{ env.AVG_CPU }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Peak Memory Usage** | ${{ env.PEAK_MEM }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Average Memory %** | ${{ env.AVG_MEM_PERC }}% |" >> $GITHUB_STEP_SUMMARY

      - name: Update README with Stats
        if: env.RPS_VAL != '' && env.RPS_VAL != '0.00'
        run: |
          NEW_STATS="### Latest Performance (Auto-updated)\n\n\
          #### 📊 HTTP / k6 Metrics\n\n\
          | Total Requests | Requests/sec | p95 Latency | p90 Latency | Median Latency | Avg Latency | Success Rate | Failed Requests | Throughput |\n\
          | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n\
          | **${{ env.TOTAL_VAL }}** | **${{ env.RPS_VAL }} req/s** | **${{ env.P95_VAL }}ms** | **${{ env.P90_VAL }}ms** | **${{ env.MED_VAL }}ms** | **${{ env.AVG_VAL }}ms** | **${{ env.SRATE_VAL }}%** | **${{ env.FAILED_VAL }}** | **${{ env.DATA_MBPS_VAL }} MB/s** |\n\n\
          #### 🖥️ Container Resource Usage (during benchmark)\n\n\
          | Peak CPU | Avg CPU | Peak Memory | Avg Memory % |\n\
          | :--- | :--- | :--- | :--- |\n\
          | ${{ env.PEAK_CPU }}% | ${{ env.AVG_CPU }}% | ${{ env.PEAK_MEM }} | ${{ env.AVG_MEM_PERC }}% |\n\n\
          _Last Benchmarked: $(date)_"

          sed -i '/<!-- BENCHMARK_START -->/,/<!-- BENCHMARK_END -->/{/<!-- BENCHMARK_START -->/b; /<!-- BENCHMARK_END -->/b; d}' README.md
          sed -i "/<!-- BENCHMARK_START -->/a $NEW_STATS" README.md

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update benchmark results [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.head_ref }}

      - name: Show Nova Server Logs
        if: always()
        run: |
          docker logs nova-running-app 2>&1 | tail -100 | tee -a $GITHUB_STEP_SUMMARY || echo "Logs unavailable."
          echo "### 📋 Nova Server Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker logs nova-running-app 2>&1 | tail -100 >> $GITHUB_STEP_SUMMARY || echo "Logs unavailable."
          echo '```' >> $GITHUB_STEP_SUMMARY